<!DOCTYPE html>
<html lang="en">
<head>
  <title>Iframe Body with Shadow Root</title>
  <meta charset="UTF-8">
  <style>
      body {
          font-family: Arial, sans-serif;
          margin: 0;
          padding: 15px;
          background-color: #fafafa;
      }

      p {
          color: red;
      }
  </style>
</head>
<body>
<h2>I am the iframe document</h2>
<p>This paragraph lives in the iframe's light DOM and is styled red.</p>

<div id="shadow-host"></div>

<script src="/shadow-dom/_mode.js"></script>
<script>
  const mode = resolveShadowMode();

  const host = document.getElementById('shadow-host');
  const shadow = host.attachShadow({ mode });
  shadow.innerHTML = `
    <style>
      .card {
        background: #f3e5f5;
        border: 2px solid #6a1b9a;
        padding: 12px;
        border-radius: 6px;
        font-family: Arial, sans-serif;
      }
      p {
        color: #6a1b9a;
        margin: 4px 0;
      }
      button {
        padding: 6px 12px;
        background-color: #6a1b9a;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }
      .scroll-area {
        margin-top: 10px;
        height: 110px;
        overflow-y: auto;
        border: 1px solid #6a1b9a;
        border-radius: 4px;
        background: #fff;
        padding: 8px;
      }
      .scroll-area ol {
        margin: 0;
        padding-left: 22px;
      }
    </style>
    <div class="card">
      <p id="shadow-paragraph">Inside the iframe's shadow root (purple, isolated from the iframe's own page styles).</p>
      <button id="shadow-button">Shadow Button (in iframe)</button>
      <div id="shadow-scroll" class="scroll-area" data-scrollable="true">
        <ol>
          <li>Shadow-in-iframe scroll item 1</li><li>Shadow-in-iframe scroll item 2</li>
          <li>Shadow-in-iframe scroll item 3</li><li>Shadow-in-iframe scroll item 4</li>
          <li>Shadow-in-iframe scroll item 5</li><li>Shadow-in-iframe scroll item 6</li>
          <li>Shadow-in-iframe scroll item 7</li><li>Shadow-in-iframe scroll item 8</li>
          <li>Shadow-in-iframe scroll item 9</li><li>Shadow-in-iframe scroll item 10</li>
          <li>Shadow-in-iframe scroll item 11</li><li>Shadow-in-iframe scroll item 12</li>
          <li>Shadow-in-iframe scroll item 13</li><li>Shadow-in-iframe scroll item 14</li>
          <li>Shadow-in-iframe scroll item 15</li>
        </ol>
      </div>
    </div>
  `;
</script>
</body>
</html>
